<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bramble &amp; Paw — Neighborhood goods for well-loved animals</title>
  <meta name="description" content="Bramble & Paw is a fictional neighborhood pet shop — a demo storefront with six invented products and no real orders." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="img/logo.svg" type="image/svg+xml" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#/" aria-label="Bramble &amp; Paw — back to the shop">
      <svg class="brand-mark" viewBox="0 0 48 48" role="img" aria-hidden="true">
        <ellipse cx="24" cy="31" rx="10.5" ry="8.5" fill="#C05F33"/>
        <circle cx="11.5" cy="22" r="4.6" fill="#C05F33"/>
        <circle cx="21" cy="14.5" r="4.9" fill="#C05F33"/>
        <circle cx="31" cy="14.5" r="4.9" fill="#C05F33"/>
        <path d="M40.5 15.5 C46 18 46.5 25 41 27.5 C38 21.5 38.5 18.5 40.5 15.5 Z" fill="#7C8B6B"/>
        <path d="M41.6 17.2 Q41 22.5 40.2 25.6" stroke="#FAF4E9" stroke-width="1.1" fill="none" stroke-linecap="round"/>
      </svg>
      <span class="brand-text">
        <span class="brand-name">Bramble &amp; Paw</span>
        <span class="brand-tagline">Neighborhood goods for well-loved animals</span>
      </span>
    </a>
  </header>

  <main id="app" aria-live="polite">
    <p class="loading">Setting out the shelves…</p>
  </main>

  <footer class="site-footer">
    <p><strong>Bramble &amp; Paw is a fictional shop.</strong> This is a demo storefront — the buy
    button opens your email app and no real order is placed.</p>
    <p>Questions? Write to <a id="footer-contact" href="mailto:orders@brambleandpaw.example">orders@brambleandpaw.example</a></p>
  </footer>

  <noscript>
    <p class="noscript">This little shop needs JavaScript to set out its shelves — the catalog
    lives in <a href="catalog.json">catalog.json</a> if you'd like to browse it raw.</p>
  </noscript>

  <script src="app.js"></script>
</body>
</html>
