<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480">
  <ellipse cx="320" cy="420" rx="200" ry="22" fill="#33261D" opacity="0.07"/>
  <!-- shoulder loops -->
  <ellipse cx="216" cy="208" rx="82" ry="104" fill="none" stroke="#2F5F4E" stroke-width="34"/>
  <ellipse cx="424" cy="208" rx="82" ry="104" fill="none" stroke="#2F5F4E" stroke-width="34"/>
  <!-- reflective dashes on loops -->
  <ellipse cx="216" cy="208" rx="82" ry="104" fill="none" stroke="#F7EEDD" stroke-width="5" stroke-dasharray="3 22"/>
  <ellipse cx="424" cy="208" rx="82" ry="104" fill="none" stroke="#F7EEDD" stroke-width="5" stroke-dasharray="3 22"/>
  <!-- chest band -->
  <rect x="128" y="286" width="384" height="86" rx="43" fill="#3F7A64"/>
  <rect x="128" y="286" width="384" height="86" rx="43" fill="none" stroke="#F7EEDD" stroke-width="5" stroke-dasharray="3 22"/>
  <!-- buckles -->
  <g fill="#33261D">
    <rect x="188" y="300" width="52" height="58" rx="10"/>
    <rect x="400" y="300" width="52" height="58" rx="10"/>
  </g>
  <g fill="none" stroke="#8A6A4F" stroke-width="6" stroke-linecap="round">
    <line x1="200" y1="329" x2="228" y2="329"/>
    <line x1="412" y1="329" x2="440" y2="329"/>
  </g>
  <!-- chest plate + D-ring -->
  <rect x="286" y="272" width="68" height="114" rx="22" fill="#2F5F4E"/>
  <circle cx="320" cy="272" r="24" fill="none" stroke="#F2B84B" stroke-width="10"/>
  <!-- label patch -->
  <g>
    <rect x="296" y="330" width="48" height="36" rx="9" fill="#F2B84B"/>
    <ellipse cx="320" cy="354" rx="7" ry="5.5" fill="#33261D"/>
    <circle cx="312" cy="346" r="3" fill="#33261D"/>
    <circle cx="317" cy="342" r="3" fill="#33261D"/>
    <circle cx="323" cy="342" r="3" fill="#33261D"/>
    <circle cx="328" cy="346" r="3" fill="#33261D"/>
  </g>
</svg>
