<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>testimonials — petshop-live</title>
  <meta name="description" content="What customers say about petshop-live: toys that survive beagles, food advice that works, and pickup the shop cat approves of.">
  <meta name="theme-color" content="#FBF5EC">
  <link rel="icon" href="/img/logo.svg" type="image/svg+xml">
  <style>
    /* Self-contained on purpose: like the FAQ, this page carries its own copy of the store palette. */
    :root {
      --cream: #FBF5EC; --card: #FFFFFF; --ink: #33261D; --ink-soft: #6B5A4E;
      --clay: #C2553A; --pine: #3F7A64; --pine-soft: #E4EFE9; --sun: #F2B84B;
      --line: #E8DCC9; --radius: 18px; --shadow: 0 10px 30px rgba(51, 38, 29, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--cream); color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 17px; line-height: 1.55;
    }
    a { color: var(--pine); }
    :focus-visible { outline: 3px solid var(--sun); outline-offset: 2px; border-radius: 6px; }
    .site-head {
      position: sticky; top: 0; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
      gap: 16px; padding: 14px clamp(20px, 5vw, 56px);
      background: rgba(251, 245, 236, 0.9); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }
    .brand-name { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.02em; color: var(--ink); text-decoration: none; }
    .brand-name .dot { color: var(--clay); }
    .site-nav { display: flex; flex-wrap: wrap; gap: clamp(14px, 3vw, 28px); }
    .site-nav a { color: var(--ink-soft); text-decoration: none; font-weight: 600; }
    .site-nav a:hover { color: var(--clay); }
    .site-nav a[aria-current] { color: var(--ink); }
    main { max-width: 720px; margin: 0 auto; padding: clamp(40px, 7vw, 80px) clamp(20px, 5vw, 56px) clamp(24px, 4vw, 56px); }
    .kicker { color: var(--clay); font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; font-size: 0.82rem; margin: 0 0 10px; }
    h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; line-height: 1.15; letter-spacing: -0.01em; margin: 0 0 0.3em; }
    .lead { color: var(--ink-soft); max-width: 52ch; margin: 0 0 34px; }
    .quote-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px 28px 26px; margin: 0 0 18px; }
    .topic {
      display: inline-block; background: var(--pine-soft); color: var(--pine);
      font-size: 0.74rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      padding: 4px 10px; border-radius: 999px; margin-bottom: 12px;
    }
    .quote-card blockquote { margin: 0 0 12px; }
    .quote-card blockquote p { font-size: 1.08rem; line-height: 1.5; letter-spacing: -0.005em; margin: 0; }
    .quote-card figcaption { color: var(--ink-soft); font-weight: 600; }
    .site-foot { border-top: 1px solid var(--line); margin-top: clamp(28px, 5vw, 56px); padding: 34px clamp(20px, 5vw, 56px) 44px; text-align: center; color: var(--ink-soft); }
    .foot-brand { font-weight: 800; color: var(--ink); font-size: 1.1rem; margin-bottom: 8px; }
    .site-foot p { margin: 4px 0; }
    @media (max-width: 640px) { .site-nav { gap: 14px; font-size: 0.95rem; } body { font-size: 16px; } }
  </style>
</head>
<body>
  <header class="site-head">
    <a class="brand-name" href="/">petshop<span class="dot">·</span>live</a>
    <nav class="site-nav">
      <a href="/#shop">shop</a>
      <a href="/#about">about</a>
      <a href="/faq.html">faq</a>
      <a href="/testimonials.html" aria-current="page">testimonials</a>
      <a href="/giftcards.html">gift cards</a>
      <a href="mailto:orders@petshop.live">contact</a>
    </nav>
  </header>

  <main>
    <p class="kicker">testimonials</p>
    <h1>kind words.</h1>
    <p class="lead">three notes from customers and their pets. lightly tidied for length, otherwise exactly as they arrived.</p>

    <figure class="quote-card">
      <span class="topic">toys</span>
      <blockquote>
        <p>“The rope tug survived a beagle. Nothing survives a beagle. Three months in, it still looks like we bought it last week.”</p>
      </blockquote>
      <figcaption>— Marieke, with Bo the beagle</figcaption>
    </figure>

    <figure class="quote-card">
      <span class="topic">food advice</span>
      <blockquote>
        <p>“I emailed a photo of our old food label and got a shortlist back the same evening. Our very picky cat cleared the first bowl — that has never happened.”</p>
      </blockquote>
      <figcaption>— Tom &amp; Ines, cat household of one opinionated tabby</figcaption>
    </figure>

    <figure class="quote-card">
      <span class="topic">pickup</span>
      <blockquote>
        <p>“Ordered on Friday, picked it up Saturday before the market. The shop cat inspected my bag and approved, which I understand is rare.”</p>
      </blockquote>
      <figcaption>— Saskia, Saturday regular</figcaption>
    </figure>
  </main>

  <footer class="site-foot">
    <div class="foot-brand">petshop·live</div>
    <p>orders &amp; questions: <a href="mailto:orders@petshop.live">orders@petshop.live</a></p>
    <p>havenstraat 12, amsterdam · tue–sat 9:00–18:00</p>
  </footer>
</body>
</html>
